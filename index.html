<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具 · Toolbox</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">工具</div>
    <nav class="sidebar-list">
      <a
        v-for="item in navItems"
        :key="item.id"
        :href="item.href"
        class="sidebar-item"
        :class="{ active: item.active }"
      >{{ item.name }}</a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" @click="dark = !dark">
        {{ dark ? '浅色' : '深色' }}
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <span class="main-title">工具箱</span>
      <span class="main-desc">选择左侧工具开始使用</span>
    </div>
    <div class="nav-cards">
      <a v-for="item in navItems" :key="item.id" :href="item.href" class="nav-card">
        <div class="nav-card-icon">{{ item.icon }}</div>
        <div class="nav-card-name">{{ item.name }}</div>
        <div class="nav-card-desc">{{ item.desc }}</div>
      </a>
    </div>
  </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
var { createApp, ref, watch } = Vue;

createApp({
  setup: function () {
    var dark = ref(false);

    function applyTheme(val) {
      document.documentElement.classList.toggle('dark', val);
    }
    applyTheme(dark.value);
    watch(dark, applyTheme);

    var navItems = ref([
      { id: 'cipher', name: '密码工具', href: 'cipher.html', icon: '\u{1F512}', desc: '加密与解密', active: false },
      { id: 'chart', name: '图表绘制', href: 'chart.html', icon: '\u{1F4CA}', desc: '折线 · 条形 · 扇形', active: false },
    ]);

    return { dark: dark, navItems: navItems };
  }
}).mount('#app');
</script>

</body>
</html>
